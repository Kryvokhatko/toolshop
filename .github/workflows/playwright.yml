name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Playwright E2E (Public Repo)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      UI_URL: ${{ secrets.UI_URL }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      CUSTOMER_USERNAME: ${{ secrets.CUSTOMER_USERNAME }}
      CUSTOMER_PASSWORD: ${{ secrets.CUSTOMER_PASSWORD }}
      GUEST_USERNAME: ${{ secrets.GUEST_USERNAME }}
      GUEST_PASSWORD: ${{ secrets.GUEST_PASSWORD }}
      CUSTOMER_FIRST_NAME: ${{ secrets.CUSTOMER_FIRST_NAME }}
      CUSTOMER_LAST_NAME: ${{ secrets.CUSTOMER_LAST_NAME }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
