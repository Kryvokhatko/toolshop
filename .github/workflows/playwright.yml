name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Basic checks (GitHub runner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Type check / smoke
        run: npx playwright --version

  dispatch-e2e:
    name: Trigger E2E in private repo
    # Only dispatch on push to main or manual trigger — never on fork PRs
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch E2E run to private repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PRIVATE_E2E_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'Kryvokhatko',
              repo: 'toolshop-e2e-private',
              event_type: 'run-e2e',
              client_payload: {
                sha: context.sha,
                ref: context.ref,
                source_repo: context.repo.repo,
              },
            });
