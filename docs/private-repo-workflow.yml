# ============================================================
# Copy this file into your PRIVATE repo at:
#   .github/workflows/e2e.yml
#
# That repo: Kryvokhatko/toolshop-e2e-private
# ============================================================

name: Playwright E2E

on:
  # Triggered by public repo dispatch
  repository_dispatch:
    types: [run-e2e]
  # Manual rerun from GitHub UI
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA from public repo (leave blank for latest main)'
        required: false

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest   # change to [self-hosted, windows, x64] if needed
    timeout-minutes: 60
    env:
      UI_URL: ${{ secrets.UI_URL }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      CUSTOMER_USERNAME: ${{ secrets.CUSTOMER_USERNAME }}
      CUSTOMER_PASSWORD: ${{ secrets.CUSTOMER_PASSWORD }}
      GUEST_USERNAME: ${{ secrets.GUEST_USERNAME }}
      GUEST_PASSWORD: ${{ secrets.GUEST_PASSWORD }}
      CUSTOMER_FIRST_NAME: ${{ secrets.CUSTOMER_FIRST_NAME }}
      CUSTOMER_LAST_NAME: ${{ secrets.CUSTOMER_LAST_NAME }}
    steps:
      # Checkout the PUBLIC repo at the exact commit that triggered the dispatch
      - name: Checkout public repo at dispatched SHA
        uses: actions/checkout@v6
        with:
          repository: Kryvokhatko/toolshop
          # Use the SHA sent from the public repo, fall back to manual input or HEAD
          ref: ${{ github.event.client_payload.sha || inputs.sha || 'main' }}
          # PAT that can read the public repo — github.token is enough for public repos
          token: ${{ github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
